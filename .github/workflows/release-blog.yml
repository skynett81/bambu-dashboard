name: Auto-generate blog post from release

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  create-blog-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate blog post from release
        env:
          TAG: ${{ github.event.release.tag_name }}
          TITLE: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
        run: |
          DATE=$(date +%Y-%m-%d)
          SLUG=$(echo "$TAG" | sed 's/^v//')

          cat > "website/blog/${DATE}-${SLUG}.md" << BLOGEOF
          ---
          slug: ${SLUG}
          title: "${TITLE}"
          authors: [skynett81]
          tags: [release]
          ---

          ${BODY}
          BLOGEOF

          # Clean up any leading whitespace from heredoc
          sed -i 's/^          //' "website/blog/${DATE}-${SLUG}.md"

      - name: Commit and push blog post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/blog/
          git commit -m "blog: auto-generate post for ${{ github.event.release.tag_name }}" || exit 0
          git push

  # Deploy docs after blog post is committed
  # (github-actions[bot] commits don't trigger push workflows, so we build+deploy here)
  deploy-docs:
    needs: create-blog-post
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Fetch the latest commit (including the blog post just pushed)
          fetch-depth: 0

      - name: Pull latest (includes blog post)
        run: git pull origin main
        working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        env:
          DOCUSAURUS_URL: https://skynett81.github.io
          DOCUSAURUS_BASE_URL: /3dprintforge/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
