name: Auto-generate blog post from release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  create-blog-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate blog post from release
        env:
          TAG: ${{ github.event.release.tag_name }}
          TITLE: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
        run: |
          DATE=$(date +%Y-%m-%d)
          SLUG=$(echo "$TAG" | sed 's/^v//')

          cat > "website/blog/${DATE}-${SLUG}.md" << BLOGEOF
          ---
          slug: ${SLUG}
          title: "${TITLE}"
          authors: [skynett81]
          tags: [release]
          ---

          ${BODY}
          BLOGEOF

          # Clean up any leading whitespace from heredoc
          sed -i 's/^          //' "website/blog/${DATE}-${SLUG}.md"

      - name: Commit and push blog post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/blog/
          git commit -m "blog: auto-generate post for ${{ github.event.release.tag_name }}" || exit 0
          git push
