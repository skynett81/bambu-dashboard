<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambu Dashboard</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/assets/favicon.svg" alt="Logo" class="sidebar-logo">
        <div class="sidebar-title">Bambu Dashboard <span class="sidebar-by">by SkyNett81</span></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <button class="sidebar-btn active" data-panel="dashboard" onclick="showDashboard()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n-key="nav.dashboard">Dashboard</span>
        </button>
        <button class="sidebar-btn" data-panel="controls" onclick="openPanel('controls')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          <span data-i18n-key="tabs.controls">Kontroller</span>
        </button>
        <button class="sidebar-btn" data-panel="history" onclick="openPanel('history')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span data-i18n-key="tabs.history">Historikk</span>
        </button>
        <button class="sidebar-btn" data-panel="stats" onclick="openPanel('stats')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span data-i18n-key="tabs.statistics">Statistikk</span>
        </button>
        <button class="sidebar-btn" data-panel="telemetry" onclick="openPanel('telemetry')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span data-i18n-key="tabs.telemetry">Telemetri</span>
        </button>
        <button class="sidebar-btn" data-panel="filament" onclick="openPanel('filament')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          <span data-i18n-key="tabs.filament">Filament</span>
        </button>
        <button class="sidebar-btn" data-panel="errors" onclick="openPanel('errors')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span data-i18n-key="tabs.errors">Feillogg</span>
        </button>
        <button class="sidebar-btn" data-panel="waste" onclick="openPanel('waste')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          <span data-i18n-key="tabs.waste">Poop</span>
        </button>
        <button class="sidebar-btn" data-panel="maintenance" onclick="openPanel('maintenance')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          <span data-i18n-key="tabs.maintenance">Vedlikehold</span>
        </button>
        <button class="sidebar-btn" data-panel="protection" onclick="openPanel('protection')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span data-i18n-key="protection.title">Print Guard</span>
          <span id="protection-badge" style="display:none;background:var(--accent-red);color:#fff;font-size:0.6rem;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:auto;"></span>
        </button>
        <button class="sidebar-btn" data-panel="modelinfo" onclick="openPanel('modelinfo')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span data-i18n-key="tabs.model_info">Modell Info</span>
        </button>
        <button class="sidebar-btn" data-panel="settings" onclick="openPanel('settings')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n-key="tabs.settings">Innstillinger</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-version" id="sidebar-version">v...</div>
        <div class="sidebar-credits">
          <span data-i18n-key="sidebar.made_by">Laget av</span>
          <a href="https://geektech.no" target="_blank" rel="noopener">SkyNett81</a>
        </div>
        <div class="sidebar-links">
          <a href="https://geektech.no" target="_blank" rel="noopener" title="GeekTech.no">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </a>
          <a href="https://github.com/skynett81" target="_blank" rel="noopener" title="GitHub">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <!-- Main Content Area -->
    <div class="main-wrapper">

      <!-- Header -->
      <header class="header">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="printer-selector" id="printer-selector"></div>
        <button class="layout-lock-btn" id="layout-lock-btn" onclick="toggleLayoutLock()" title="Layout locked">
          <svg class="lock-icon lock-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="lock-icon lock-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
        </button>
        <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="theme.toggle()" title="Toggle theme">
          <svg class="theme-icon theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <span id="update-badge" class="badge badge-update" style="display:none" onclick="openPanel('settings')" title="Update available">!</span>
        <span id="connection-badge" class="badge badge-disconnected" data-i18n-key="header.connecting">Kobler til...</span>
      </header>

      <!-- Grafana-style Live Stats Strip -->
      <section class="stats-strip" id="stats-strip">
        <div class="strip-speed" id="strip-speed"></div>
        <div class="spark-panel" id="spark-nozzle">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="temperature.nozzle">Dyse</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="spark-panel" id="spark-bed">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="temperature.bed">Seng</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="spark-panel" id="spark-chamber">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="temperature.chamber">Kammer</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="spark-panel" id="spark-fan">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="controls.fan_part">Delvifte</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="spark-panel" id="spark-speed">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="telemetry.speed_mag">Hastighet</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="spark-panel" id="spark-layer">
          <div class="spark-header">
            <span class="spark-label" data-i18n-key="history.layers">Lag</span>
            <span class="spark-value">--</span>
          </div>
          <div class="spark-chart"></div>
        </div>
        <div class="strip-indicators">
          <div class="strip-ind">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
            <span class="strip-ind-val" id="wifi-signal">--</span>
          </div>
          <div class="strip-ind">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span class="strip-ind-val" id="light-status">--</span>
          </div>
        </div>
      </section>

      <!-- Panel Content (inline, replaces dashboard when active) -->
      <div class="panel-content" id="panel-content" style="display:none">
        <div class="panel-content-header">
          <button class="panel-back-btn" onclick="showDashboard()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span data-i18n-key="nav.dashboard">Dashboard</span>
          </button>
          <h2 class="panel-content-title" id="overlay-panel-title"></h2>
        </div>
        <div class="panel-content-body" id="overlay-panel-body"></div>
      </div>

      <!-- Dashboard Grid -->
      <main class="dashboard" id="dashboard-grid">

        <div class="card" id="progress-card">
          <!-- 3D fullscreen overlay button -->
          <div class="camera-overlay model-overlay" id="model-overlay">
            <button class="camera-fullscreen-btn" title="3D Fullscreen" onclick="open3dFullscreen()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
              </svg>
            </button>
          </div>
          <div id="print-mw-container" style="display:none">
            <img id="print-mw-image" class="print-mw-image" alt="">
            <img id="print-mw-reveal" class="print-mw-reveal" alt="">
            <div id="print-mw-edge" class="print-mw-edge"></div>
          </div>
          <canvas id="print-model-canvas" class="print-model-canvas"></canvas>
          <!-- Prepare overlay (upload/heating) -->
          <div class="prepare-overlay" id="prepare-overlay" style="display:none">
            <div class="prepare-icon" id="prepare-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <div class="prepare-status" id="prepare-status"></div>
            <div class="prepare-bar-wrap">
              <div class="prepare-bar" id="prepare-bar"></div>
            </div>
            <div class="prepare-detail" id="prepare-detail"></div>
          </div>
          <!-- HUD overlay -->
          <div class="print-preview-hud" id="print-preview-hud">
            <div class="hud-top">
              <span class="hud-file" id="hud-file">--</span>
              <span class="hud-state" id="hud-state"></span>
            </div>
            <div class="hud-bottom">
              <div class="hud-ring-wrap">
                <svg class="progress-ring" viewBox="0 0 140 140" id="progress-ring"></svg>
              </div>
              <div class="hud-stats">
                <div class="hud-pct" id="hud-pct">0%</div>
                <div class="progress-countdown" id="progress-countdown"></div>
                <div class="progress-eta" id="progress-eta"></div>
                <div class="hud-layers" id="progress-layers">--</div>
              </div>
              <div class="hud-filament" id="active-filament">
                <span class="text-muted" data-i18n-key="progress.waiting">Venter...</span>
              </div>
            </div>
          </div>
          <!-- Hidden compat elements for print-progress.js -->
          <div style="display:none">
            <span id="progress-file">--</span>
            <span id="progress-state"></span>
            <span id="progress-time">--</span>
          </div>
          <!-- Model metadata bar (dimensions, weight, slice info) -->
          <div class="model-meta-bar" id="model-meta-bar" style="display:none"></div>
        </div>

        <div class="card" id="camera-card">
          <div class="card-title" data-i18n-key="camera.title">Kamera</div>
          <div id="camera-container" class="camera-container">
            <div class="camera-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="6" width="15" height="12" rx="2"/>
                <path d="M17 10l4-2v8l-4-2z"/>
              </svg>
              <span data-i18n-key="camera.not_available">Kamera ikke tilgjengelig</span>
            </div>
          </div>
        </div>

        <div class="card" id="ams-card">
          <div class="card-title" id="ams-header">AMS</div>
          <div class="ams-slots" id="ams-slots">
            <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
            <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
            <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
            <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
          </div>
        </div>

        <!-- MakerWorld info — compact, under 3D preview, beside temperatures -->
        <!-- Model Info strip (MakerWorld / Printables / Thingiverse) -->
        <div class="model-info-strip" id="model-info" style="display:none"></div>

        <div class="card" id="temp-card">
          <div class="card-title" data-i18n-key="temperature.title">Temperaturer</div>
          <div class="temp-gauges">
            <div class="gauge-wrapper">
              <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-nozzle"></svg>
              <div class="gauge-label" data-i18n-key="temperature.nozzle">Dyse</div>
            </div>
            <div class="gauge-wrapper">
              <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-bed"></svg>
              <div class="gauge-label" data-i18n-key="temperature.bed">Seng</div>
            </div>
            <div class="gauge-wrapper">
              <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-chamber"></svg>
              <div class="gauge-label" data-i18n-key="temperature.chamber">Kammer</div>
            </div>
          </div>
        </div>

        <div class="card" id="fans-card">
          <div class="card-title" data-i18n-key="quick_status.fans">Vifter</div>
          <div id="fans-card-content"></div>
        </div>

        <div class="card" id="quick-status-card">
          <div class="card-title" data-i18n-key="quick_status.title">Status</div>
          <div id="quick-status-content"></div>
        </div>

      </main>

    </div><!-- /main-wrapper -->

  </div><!-- /app-layout -->

  <!-- Camera Fullscreen Modal -->
  <div class="camera-modal" id="camera-modal">
    <div class="camera-modal-content">
      <div class="camera-modal-header">
        <span class="camera-modal-title" data-i18n-key="camera.title">Kamera</span>
        <button class="camera-modal-close" onclick="closeCameraModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="camera-fullscreen-container" class="camera-fullscreen-container"></div>
      <div class="camera-stream-link" id="camera-stream-link" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <span class="camera-stream-label" data-i18n-key="camera.stream_url">Stream URL:</span>
        <code class="camera-stream-url"></code>
        <button class="camera-copy-btn" data-i18n-key="camera.copy">Kopier</button>
      </div>
    </div>
  </div>

  <!-- 3D Model Fullscreen Modal -->
  <div class="camera-modal" id="model-modal">
    <div class="camera-modal-content model-modal-content">
      <div class="camera-modal-header">
        <span class="camera-modal-title" data-i18n-key="model.preview">3D-visning</span>
        <button class="camera-modal-close" onclick="close3dFullscreen()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="model-fullscreen-container" class="camera-fullscreen-container model-fullscreen-container"></div>
    </div>
  </div>

  <!-- Card hover glow tracking -->
  <script>
    // HTML escape — prevents XSS in innerHTML templates
    var _escMap = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    window.esc = function(s) { return s == null ? '' : String(s).replace(/[&<>"']/g, function(c) { return _escMap[c]; }); };

    document.addEventListener('mousemove', e => {
      const cards = document.querySelectorAll('.card');
      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
        card.style.setProperty('--mouse-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
      }
    });
  </script>
