<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambu Dashboard</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <!-- Skip link for keyboard accessibility -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/assets/favicon.svg" alt="Logo" class="sidebar-logo">
        <div class="sidebar-title">Bambu Dashboard <span class="sidebar-by">by SkyNett81</span></div>
        <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" data-tooltip="Collapse" data-tooltip-pos="right">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav" role="navigation" aria-label="Main navigation">
        <button class="sidebar-btn active" data-panel="dashboard" onclick="showDashboard()" data-ripple>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n-key="nav.dashboard">Dashboard</span>
        </button>

        <!-- Utskrift (Printing) -->
        <div class="sidebar-section" data-section="printing" style="--section-color: var(--accent-blue)">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('printing')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_printing">Utskrift</span>
            <span class="sidebar-section-count">4</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="controls" onclick="openPanel('controls')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
              <span data-i18n-key="tabs.controls">Kontroller</span>
            </button>
            <button class="sidebar-btn" data-panel="queue" onclick="openPanel('queue')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
              <span data-i18n-key="queue.title">Utskriftskø</span>
            </button>
            <button class="sidebar-btn" data-panel="scheduler" onclick="openPanel('scheduler')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span data-i18n-key="tabs.scheduler">Planlegger</span>
            </button>
            <button class="sidebar-btn" data-panel="fleet" onclick="openPanel('fleet')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <span data-i18n-key="tabs.fleet">Flåte</span>
            </button>
          </div>
        </div>

        <!-- Historikk (History) -->
        <div class="sidebar-section" data-section="history" style="--section-color: #06b6d4">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('history')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_history">Historikk</span>
            <span class="sidebar-section-count">1</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="history" onclick="openPanel('history')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span data-i18n-key="tabs.history">Historikk</span>
            </button>
          </div>
        </div>

        <!-- Analyse (Analysis) -->
        <div class="sidebar-section" data-section="analysis" style="--section-color: #8b5cf6">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('analysis')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="tabs.analysis">Analyse</span>
            <span class="sidebar-section-count">3</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="analysis" onclick="openPanel('analysis')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              <span data-i18n-key="tabs.statistics">Statistikk</span>
            </button>
            <button class="sidebar-btn" data-panel="calendar" onclick="openPanel('calendar')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span data-i18n-key="nav.calendar">Printkalender</span>
            </button>
            <button class="sidebar-btn" data-panel="erroranalysis" onclick="openPanel('erroranalysis')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/><polyline points="7.5 4.21 12 6.81 16.5 4.21"/><polyline points="7.5 19.79 7.5 14.6 3 12"/><polyline points="21 12 16.5 14.6 16.5 19.79"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              <span data-i18n-key="error_analysis.title">Feilmønster AI</span>
            </button>
          </div>
        </div>

        <!-- Overvåking (Monitoring) -->
        <div class="sidebar-section" data-section="monitoring" style="--section-color: var(--accent-orange)">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('monitoring')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_monitoring">Overvåking</span>
            <span class="sidebar-section-count">4</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="diagnostics" onclick="openPanel('diagnostics')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              <span data-i18n-key="tabs.diagnostics">Diagnostikk</span>
            </button>
            <button class="sidebar-btn" data-panel="protection" onclick="openPanel('protection')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <span data-i18n-key="protection.title">Print Guard</span>
              <span id="protection-badge" style="display:none;background:var(--accent-red);color:#fff;font-size:0.6rem;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:auto;"></span>
            </button>
            <button class="sidebar-btn" data-panel="errors" onclick="openPanel('errors')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span data-i18n-key="tabs.errors">Feillogg</span>
            </button>
            <button class="sidebar-btn" data-panel="maintenance" onclick="openPanel('maintenance')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
              <span data-i18n-key="tabs.maintenance">Vedlikehold</span>
            </button>
          </div>
        </div>

        <!-- Materialer (Materials) -->
        <div class="sidebar-section" data-section="materials" style="--section-color: var(--accent-green)">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('materials')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_materials">Materialer</span>
            <span class="sidebar-section-count">3</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="filament" onclick="openPanel('filament')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
              <span data-i18n-key="tabs.filament">Filament</span>
            </button>
            <button class="sidebar-btn" data-panel="materialrec" onclick="openPanel('materialrec')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
              <span data-i18n-key="material_rec.title">Anbefalinger</span>
            </button>
            <button class="sidebar-btn" data-panel="filamentanalytics" onclick="openPanel('filamentanalytics')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v9h-9"/></svg>
              <span data-i18n-key="tabs.filament_analytics">Filament Analyse</span>
            </button>
          </div>
        </div>

        <!-- Bibliotek (Library) -->
        <div class="sidebar-section" data-section="library" style="--section-color: var(--accent-purple)">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('library')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_library">Bibliotek</span>
            <span class="sidebar-section-count">4</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="library" onclick="openPanel('library')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
              <span data-i18n-key="tabs.library">Filbibliotek</span>
            </button>
            <button class="sidebar-btn" data-panel="knowledge" onclick="openPanel('knowledge')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
              <span data-i18n-key="nav.knowledge">Kunnskapsbase</span>
            </button>
            <button class="sidebar-btn" data-panel="screenshots" onclick="openPanel('screenshots')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M7 3V1"/><path d="M17 3V1"/></svg>
              <span data-i18n-key="screenshots.title">Skjermbilder</span>
            </button>
            <button class="sidebar-btn" data-panel="profiles" onclick="openPanel('profiles')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span data-i18n-key="nav.profiles">Utskriftsprofiler</span>
            </button>
          </div>
        </div>

        <!-- Verktøy (Tools) -->
        <div class="sidebar-section" data-section="tools" style="--section-color: var(--accent-red)">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('tools')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span data-i18n-key="sidebar.section_tools">Verktøy</span>
            <span class="sidebar-section-count">5</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="costestimator" onclick="openPanel('costestimator')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><circle cx="15" cy="17" r="2"/></svg>
              <span data-i18n-key="tabs.costestimator">Kostnadskalkulator</span>
            </button>
            <button class="sidebar-btn" data-panel="labels" onclick="openPanel('labels')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h4v4H7z"/><path d="M7 13h10"/><path d="M7 17h10"/></svg>
              <span data-i18n-key="tabs.labels">Etiketter</span>
            </button>
            <button class="sidebar-btn" data-panel="widgets" onclick="openPanel('widgets')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="4" rx="1"/><rect x="13" y="9" width="8" height="2" rx="1"/><rect x="3" y="13" width="8" height="4" rx="1"/><rect x="3" y="19" width="8" height="2" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
              <span data-i18n-key="tabs.widgets">Widgets</span>
            </button>
            <button class="sidebar-btn" data-panel="playground" onclick="openPanel('playground')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
              <span data-i18n-key="tabs.playground">API Lekeplass</span>
            </button>
            <button class="sidebar-btn" data-panel="achievements" onclick="openPanel('achievements')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0114 0v2"/><path d="M17 11l2 2 4-4"/></svg>
              <span data-i18n-key="achievements.title">Prestasjoner</span>
            </button>
          </div>
        </div>

        <!-- System -->
        <div class="sidebar-section" data-section="system" style="--section-color: #64748b">
          <button class="sidebar-section-toggle" onclick="toggleSidebarSection('system')" data-ripple>
            <svg class="sidebar-section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            <span>System</span>
            <span class="sidebar-section-count">4</span>
          </button>
          <div class="sidebar-section-items">
            <button class="sidebar-btn" data-panel="plugins" onclick="openPanel('plugins')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
              <span data-i18n-key="tabs.plugins">Plugins</span>
            </button>
            <button class="sidebar-btn" data-panel="backup" onclick="openPanel('backup')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span data-i18n-key="tabs.backup">Sikkerhetskopi</span>
            </button>
            <button class="sidebar-btn" data-panel="logs" onclick="openPanel('logs')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
              <span data-i18n-key="logs.title">Serverlogg</span>
            </button>
            <button class="sidebar-btn" data-panel="settings" onclick="openPanel('settings')" data-ripple>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span data-i18n-key="tabs.settings">Innstillinger</span>
            </button>
          </div>
        </div>
      </nav>
      <div class="sidebar-status" id="sidebar-status">
        <div class="sidebar-status-title" data-i18n-key="quick_status.title">Status</div>
        <div id="sidebar-status-content"></div>
      </div>
      <div class="sidebar-footer">
        <button id="pwa-install-btn" class="sidebar-btn sidebar-btn-install" style="display:none" onclick="installPwa()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Install App</span>
        </button>
        <div class="sidebar-version" id="sidebar-version">v...</div>
        <div class="sidebar-credits">
          <span data-i18n-key="sidebar.made_by">Laget av</span>
          <a href="https://geektech.no" target="_blank" rel="noopener">SkyNett81</a>

  <script>
    // HTML escape — prevents XSS in innerHTML templates
    var _escMap = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    window.esc = function(s) { return s == null ? '' : String(s).replace(/[&<>"']/g, function(c) { return _escMap[c]; }); };

    document.addEventListener('mousemove', e => {
      const cards = document.querySelectorAll('.card');
      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
        card.style.setProperty('--mouse-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
      }
    });
  </script>

    _deferredInstall = e;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = '';
  });

  window.installPwa = async function() {
    if (!_deferredInstall) return;
    _deferredInstall.prompt();
    const { outcome } = await _deferredInstall.userChoice;
    if (outcome === 'accepted') {
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
    }
    _deferredInstall = null;
  };

  window.addEventListener('appinstalled', () => {
    _deferredInstall = null;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  });

  // Web Push notification subscription
  function _swReady(timeout) {
    return Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, reject) => setTimeout(() => reject(new Error(t('settings.push_sw_required'))), timeout || 5000))
    ]);
  }

  window.subscribePush = async function() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return alert(t('settings.push_not_supported'));
    try {
      const reg = await _swReady(5000);
      const resp = await fetch('/api/push/vapid-key');
      const { key } = await resp.json();
      if (!key) return alert(t('settings.push_no_vapid'));
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: key
      });
      const json = sub.toJSON();
      await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint: json.endpoint, keys: json.keys })
      });
      alert(t('settings.push_enabled_ok'));
    } catch (e) {
      alert(t('settings.push_failed') + ': ' + e.message);
    }
  };

  window.unsubscribePush = async function() {
    try {
      const reg = await _swReady(5000);
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await fetch('/api/push/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint })
        });
        await sub.unsubscribe();
      }
      alert(t('settings.push_disabled_ok'));
    } catch (e) {
      alert(t('settings.push_failed') + ': ' + e.message);
    }
  };
  </script>

</body>
</html>
