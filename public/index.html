<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambu Dashboard</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="/assets/favicon.svg" alt="Logo" class="header-logo">
      <div>
        <div class="header-title">Bambu Dashboard</div>
        <div class="header-subtitle" data-i18n-key="header.subtitle">3D Printer Kontrollpanel</div>
      </div>
    </div>
    <div class="printer-selector" id="printer-selector"></div>
    <span id="connection-badge" class="badge badge-disconnected" data-i18n-key="header.connecting">Kobler til...</span>
  </header>

  <!-- Top Navigation Bar -->
  <nav class="topnav" id="topnav">
    <button class="topnav-btn" data-panel="history" onclick="openPanel('history')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-i18n-key="tabs.history">Historikk</span>
    </button>
    <button class="topnav-btn" data-panel="stats" onclick="openPanel('stats')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span data-i18n-key="tabs.statistics">Statistikk</span>
    </button>
    <button class="topnav-btn" data-panel="telemetry" onclick="openPanel('telemetry')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span data-i18n-key="tabs.telemetry">Telemetri</span>
    </button>
    <button class="topnav-btn" data-panel="filament" onclick="openPanel('filament')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      <span data-i18n-key="tabs.filament">Filament</span>
    </button>
    <button class="topnav-btn" data-panel="errors" onclick="openPanel('errors')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span data-i18n-key="tabs.errors">Feillogg</span>
    </button>
    <button class="topnav-btn" data-panel="waste" onclick="openPanel('waste')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      <span data-i18n-key="tabs.waste">Poop</span>
    </button>
    <button class="topnav-btn" data-panel="maintenance" onclick="openPanel('maintenance')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span data-i18n-key="tabs.maintenance">Vedlikehold</span>
    </button>
    <button class="topnav-btn" data-panel="settings" onclick="openPanel('settings')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span data-i18n-key="tabs.settings">Innstillinger</span>
    </button>
  </nav>

  <!-- Grafana-style Live Stats Strip -->
  <section class="stats-strip" id="stats-strip">
    <div class="strip-speed">
      <div class="speed-buttons" id="speed-buttons">
        <button class="speed-btn" data-level="1" onclick="sendCommand('speed', {value:1})" data-i18n-key="speed.silent">Stille</button>
        <button class="speed-btn active" data-level="2" onclick="sendCommand('speed', {value:2})" data-i18n-key="speed.standard">Standard</button>
        <button class="speed-btn" data-level="3" onclick="sendCommand('speed', {value:3})" data-i18n-key="speed.sport">Sport</button>
        <button class="speed-btn" data-level="4" onclick="sendCommand('speed', {value:4})" data-i18n-key="speed.ludicrous">Vanvidd</button>
      </div>
    </div>
    <div class="spark-panel" id="spark-nozzle">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="temperature.nozzle">Dyse</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="spark-panel" id="spark-bed">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="temperature.bed">Seng</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="spark-panel" id="spark-chamber">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="temperature.chamber">Kammer</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="spark-panel" id="spark-fan">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="controls.fan_part">Delvifte</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="spark-panel" id="spark-speed">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="telemetry.speed_mag">Hastighet</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="spark-panel" id="spark-layer">
      <div class="spark-header">
        <span class="spark-label" data-i18n-key="history.layers">Lag</span>
        <span class="spark-value">--</span>
      </div>
      <div class="spark-chart"></div>
    </div>
    <div class="strip-indicators">
      <div class="strip-ind">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
        <span class="strip-ind-val" id="wifi-signal">--</span>
      </div>
      <div class="strip-ind">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span class="strip-ind-val" id="light-status">--</span>
      </div>
    </div>
  </section>

  <!-- Slide-down overlay panel (shared by all menu items) -->
  <div class="overlay-panel" id="overlay-panel">
    <div class="overlay-panel-inner">
      <div class="overlay-panel-header">
        <h2 class="overlay-panel-title" id="overlay-panel-title"></h2>
        <button class="overlay-panel-close" onclick="closePanel()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="overlay-panel-body" id="overlay-panel-body"></div>
    </div>
  </div>

  <!-- Dashboard Grid -->
  <main class="dashboard">

    <!-- Row 1: Utskriftsstatus (prominent), Kamera -->
    <div class="card card-wide" id="progress-card">
      <div class="print-status-panel">
        <div class="print-status-left">
          <svg class="progress-ring" viewBox="0 0 140 140" id="progress-ring"></svg>
        </div>
        <div class="print-status-center">
          <div class="progress-file" id="progress-file">--</div>
          <div class="progress-state" id="progress-state">Ledig</div>
          <div class="progress-eta" id="progress-eta"></div>
          <div class="progress-countdown" id="progress-countdown"></div>
          <div class="progress-layers" id="progress-layers">--</div>
          <div class="progress-time" id="progress-time">--</div>
        </div>
        <div class="print-status-right" id="active-filament">
          <span class="text-muted" data-i18n-key="progress.waiting">Venter pa data...</span>
        </div>
      </div>
    </div>

    <div class="card" id="camera-card">
      <div class="card-title" data-i18n-key="camera.title">Kamera</div>
      <div id="camera-container" class="camera-container">
        <div class="camera-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="6" width="15" height="12" rx="2"/>
            <path d="M17 10l4-2v8l-4-2z"/>
          </svg>
          <span data-i18n-key="camera.not_available">Kamera ikke tilgjengelig</span>
        </div>
      </div>
    </div>

    <!-- Row 2: Temperaturer, AMS -->
    <div class="card" id="temp-card">
      <div class="card-title" data-i18n-key="temperature.title">Temperaturer</div>
      <div class="temp-gauges">
        <div class="gauge-wrapper">
          <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-nozzle"></svg>
          <div class="gauge-label" data-i18n-key="temperature.nozzle">Dyse</div>
        </div>
        <div class="gauge-wrapper">
          <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-bed"></svg>
          <div class="gauge-label" data-i18n-key="temperature.bed">Seng</div>
        </div>
        <div class="gauge-wrapper">
          <svg class="gauge-svg" viewBox="0 0 120 120" id="gauge-chamber"></svg>
          <div class="gauge-label" data-i18n-key="temperature.chamber">Kammer</div>
        </div>
      </div>
    </div>

    <!-- Row 2: AMS, Controls, Printer Info -->
    <div class="card card-wide" id="ams-card">
      <div class="card-title" id="ams-header">AMS</div>
      <div class="ams-slots" id="ams-slots">
        <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
        <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
        <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
        <div class="ams-slot ams-empty"><div class="ams-slot-inner">--</div></div>
      </div>
    </div>

    <div class="card card-wide" id="controls-card">
      <div class="card-title" data-i18n-key="controls.title">Kontroller</div>
      <div id="controls-content">
        <span class="text-muted" data-i18n-key="controls.waiting">Venter pa data...</span>
      </div>
    </div>

    <div class="card" id="info-card">
      <div class="card-title" data-i18n-key="printer_info.title">Printerinfo</div>
      <div id="printer-info">
        <span class="text-muted" data-i18n-key="printer_info.waiting">Venter pa data...</span>
      </div>
    </div>

  </main>

  <!-- Camera Fullscreen Modal -->
  <div class="camera-modal" id="camera-modal">
    <div class="camera-modal-content">
      <div class="camera-modal-header">
        <span class="camera-modal-title" data-i18n-key="camera.title">Kamera</span>
        <button class="camera-modal-close" onclick="closeCameraModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="camera-fullscreen-container" class="camera-fullscreen-container"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/i18n.js"></script>
  <script src="/js/utils/formatters.js" type="module"></script>
  <script src="/js/utils/dom-helpers.js" type="module"></script>
  <script src="/js/state.js"></script>
  <script src="/js/lib/jsmpeg.min.js"></script>
  <script src="/js/components/panel-utils.js"></script>
  <script src="/js/components/printer-selector.js"></script>
  <script src="/js/components/temperature-gauge.js"></script>
  <script src="/js/components/print-progress.js"></script>
  <script src="/js/components/ams-panel.js"></script>
  <script src="/js/components/active-filament.js"></script>
  <script src="/js/components/printer-info.js"></script>
  <script src="/js/utils/printer-capabilities.js"></script>
  <script src="/js/components/speed-control.js"></script>
  <script src="/js/components/controls-panel.js"></script>
  <script src="/js/components/fan-display.js"></script>
  <script src="/js/components/camera-view.js"></script>
  <script src="/js/components/notifications.js"></script>
  <script src="/js/components/history-table.js"></script>
  <script src="/js/components/statistics-panel.js"></script>
  <script src="/js/components/telemetry-panel.js"></script>
  <script src="/js/components/filament-tracker.js"></script>
  <script src="/js/components/error-log.js"></script>
  <script src="/js/components/waste-panel.js"></script>
  <script src="/js/components/maintenance-panel.js"></script>
  <script src="/js/components/settings-dialog.js"></script>
  <script src="/js/components/sparkline-stats.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
