<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambu Dashboard — OBS Overlay</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-card: rgba(15, 17, 23, 0.82);
      --bg-inner: rgba(255,255,255,0.05);
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #666;
      --accent-green: #00AE42;
      --accent-red: #e53935;
      --accent-orange: #f0883e;
      --accent-blue: #1279ff;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Side panel ── */
    .obs-panel {
      position: fixed;
      top: 16px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    body.pos-left .obs-panel { left: 16px; }
    body.pos-right .obs-panel { right: 16px; }

    /* ── Card base ── */
    .obs-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Header card ── */
    .obs-header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .obs-filename { font-size: 0.95rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .obs-state { font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
    .obs-state-running { background: var(--accent-green); color: #fff; }
    .obs-state-pause { background: var(--accent-orange); color: #fff; }
    .obs-state-idle { background: rgba(255,255,255,0.12); color: var(--text-secondary); }
    .obs-state-finish { background: var(--accent-green); color: #fff; }
    .obs-state-failed { background: var(--accent-red); color: #fff; }

    /* Progress section */
    .obs-progress-row { display: flex; align-items: center; gap: 10px; }
    .obs-ring-wrap { width: 56px; height: 56px; position: relative; flex-shrink: 0; }
    .obs-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .obs-ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
    .obs-ring-fill { fill: none; stroke: var(--accent-green); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .obs-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 800; }
    .obs-progress-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .obs-progress-eta { font-size: 0.75rem; color: var(--text-secondary); }
    .obs-progress-layers { font-size: 0.7rem; color: var(--text-muted); }
    .obs-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .obs-bar-fill { height: 100%; background: var(--accent-green); border-radius: 2px; transition: width 1s ease; }

    /* Stage badge */
    .obs-stage { font-size: 0.65rem; font-weight: 600; padding: 2px 7px; border-radius: 5px; white-space: nowrap; margin-top: 6px; display: inline-block; }
    .obs-stage-print { background: rgba(0,174,66,0.15); color: var(--accent-green); }
    .obs-stage-cal { background: rgba(18,121,255,0.15); color: var(--accent-blue); }
    .obs-stage-pause { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
    .obs-stage-error { background: rgba(239,68,68,0.15); color: var(--accent-red); }

    /* ── Camera card ── */
    .obs-cam-card canvas { width: 100%; border-radius: var(--radius-sm); display: block; }
    .obs-cam-card .obs-cam-off { font-size: 0.75rem; color: var(--text-muted); text-align: center; padding: 30px 0; }

    /* ── Temps card ── */
    .obs-temps { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .obs-temp-item { background: var(--bg-inner); border-radius: var(--radius-sm); padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
    .obs-temp-icon { opacity: 0.5; flex-shrink: 0; }
    .obs-temp-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }
    .obs-temp-val { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .obs-temp-info { display: flex; flex-direction: column; }

    /* ── AMS card with spool visuals ── */
    .obs-ams-title { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 10px; }
    .obs-trays { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .obs-tray { display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--bg-inner); border-radius: var(--radius-sm); padding: 10px 6px 8px; position: relative; }
    .obs-tray.active { outline: 1.5px solid var(--accent-green); outline-offset: -1.5px; }
    .obs-tray-spool { width: 48px; height: 48px; flex-shrink: 0; }
    .obs-tray-spool svg { width: 100%; height: 100%; }
    .obs-tray-spool .spool-flange { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 2; }
    .obs-tray-spool .spool-hub { fill: rgba(20,22,28,0.9); stroke: rgba(255,255,255,0.15); stroke-width: 1.5; }
    .obs-tray-spool .spool-hole { fill: rgba(10,10,14,0.95); }
    .obs-tray-spool .spool-winding { fill: none; stroke: rgba(0,0,0,0.15); stroke-width: 0.6; }
    .obs-tray-label { font-size: 0.65rem; color: var(--text-secondary); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .obs-tray-pct { font-size: 0.8rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .obs-tray-slot { position: absolute; top: 4px; left: 6px; font-size: 0.55rem; color: var(--text-muted); font-weight: 600; }
    .obs-tray-active-dot { position: absolute; top: 4px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }

    /* ── Model thumbnail ── */
    .obs-model-card img { width: 100%; border-radius: var(--radius-sm); display: block; background: var(--bg-inner); }
    .obs-model-card .obs-no-model { font-size: 0.75rem; color: var(--text-muted); text-align: center; padding: 20px 0; }

    /* Hidden */
    .obs-hidden { display: none !important; }

    /* Compact */
    body.compact .obs-panel { width: 260px; gap: 8px; }
    body.compact .obs-card { padding: 10px; }
    body.compact .obs-filename { font-size: 0.85rem; }
    body.compact .obs-ring-wrap { width: 44px; height: 44px; }
    body.compact .obs-ring-text { font-size: 0.75rem; }
  </style>
</head>
<body class="pos-right">
  <div class="obs-panel" id="obs-panel">

    <!-- Print status -->
    <div class="obs-card" id="obs-print-card">
      <div class="obs-header-row">
        <span class="obs-filename" id="obs-filename">--</span>
        <span class="obs-state obs-state-idle" id="obs-state">IDLE</span>
      </div>
      <div class="obs-progress-row">
        <div class="obs-ring-wrap">
          <svg class="obs-ring-svg" viewBox="0 0 60 60">
            <circle class="obs-ring-bg" cx="30" cy="30" r="25"/>
            <circle class="obs-ring-fill" id="obs-ring" cx="30" cy="30" r="25" stroke-dasharray="157.08" stroke-dashoffset="157.08"/>
          </svg>
          <div class="obs-ring-text" id="obs-pct">0%</div>
        </div>
        <div class="obs-progress-info">
          <div class="obs-bar"><div class="obs-bar-fill" id="obs-bar" style="width:0%"></div></div>
          <div class="obs-progress-eta" id="obs-eta">--</div>
          <div class="obs-progress-layers" id="obs-layers">--</div>
        </div>
      </div>
      <div id="obs-stage-wrap"></div>
    </div>

    <!-- Camera -->
    <div class="obs-card obs-cam-card" id="obs-cam-card">
      <div id="obs-cam-container"><div class="obs-cam-off" id="obs-cam-ph">Kamera ikke tilgjengelig</div></div>
    </div>

    <!-- Model thumbnail -->
    <div class="obs-card obs-model-card" id="obs-model-card" style="display:none">
      <img id="obs-model-img" src="" alt="">
    </div>

    <!-- Temperatures -->
    <div class="obs-card">
      <div class="obs-temps" id="obs-temps">
        <div class="obs-temp-item">
          <svg class="obs-temp-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>
          <div class="obs-temp-info"><span class="obs-temp-label">Dyse</span><span class="obs-temp-val" id="obs-nozzle">--</span></div>
        </div>
        <div class="obs-temp-item">
          <svg class="obs-temp-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="14" width="20" height="6" rx="1"/></svg>
          <div class="obs-temp-info"><span class="obs-temp-label">Seng</span><span class="obs-temp-val" id="obs-bed">--</span></div>
        </div>
        <div class="obs-temp-item">
          <svg class="obs-temp-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          <div class="obs-temp-info"><span class="obs-temp-label">Kammer</span><span class="obs-temp-val" id="obs-chamber">--</span></div>
        </div>
        <div class="obs-temp-item">
          <svg class="obs-temp-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <div class="obs-temp-info"><span class="obs-temp-label">Fart</span><span class="obs-temp-val" id="obs-speed">--</span></div>
        </div>
      </div>
    </div>

    <!-- AMS Filament -->
    <div class="obs-card" id="obs-ams-card">
      <div class="obs-ams-title">AMS Filament</div>
      <div class="obs-trays" id="obs-trays"></div>
    </div>

  </div>

  <script src="/js/lib/jsmpeg.min.js"></script>
  <script>
  (function() {
    const params = new URLSearchParams(location.search);
    const targetPrinter = params.get('printer');
    const bgMode = params.get('bg');
    const compact = params.has('compact');
    const hideIdle = params.has('hide_idle');
    const pos = params.get('pos') || 'right';

    if (bgMode) document.body.style.background = bgMode;
    if (compact) document.body.classList.add('compact');
    document.body.classList.remove('pos-left', 'pos-right');
    document.body.classList.add('pos-' + (pos === 'left' ? 'left' : 'right'));

    try {
      const cfg = JSON.parse(localStorage.getItem('bambu-theme'));
      if (cfg?.accentColor) document.documentElement.style.setProperty('--accent-green', cfg.accentColor);
    } catch (_) {}

    const CIRC = 2 * Math.PI * 25;
    const SPEED = { 1: 'Silent', 2: 'Standard', 3: 'Sport', 4: 'Ludicrous' };
    const SCLS = { RUNNING: 'obs-state-running', PAUSE: 'obs-state-pause', IDLE: 'obs-state-idle', FINISH: 'obs-state-finish', FAILED: 'obs-state-failed' };
    const STG = [
      'Printer','Auto bed-nivelering','Forvarmer varmeplate','Sveiper XY','Bytter filament',
      'M400 pause','Filament tom','Varmer dyse','Kalibrerer ekstrudering','Skanner seng',
      'Inspiserer første lag','Identifiserer plate','Kalibrerer Lidar','Homing','Renser dyse',
      'Sjekker temp','Pauset','Frontdeksel','Kalibrerer Lidar','Kalibrerer flyt',
      'Dysetemp-feil','Sengtemp-feil','Laster ut filament','Hoppet steg','Laster filament',
      'Motorkalibrering','AMS mistet','Vifte lav','Kammertemp-feil','Kjøler kammer',
      'G-kode pause','Motor-demo','Dyse dekket','Kutterfeil','Førstelagsfeil','Dyse tettet'
    ];
    const STG_ERR=[17,20,21,26,27,28,32,33,34,35], STG_P=[5,6,16,17,20,21,23,26,27,28,30,32,33,34,35], STG_C=[1,8,9,10,11,12,13,14,15,18,19,25];

    let cameraPlayer=null, cameraPort=null, printerMeta={}, activePrinterId=null, lastThumbnailUrl=null;

    function fmtT(m) { if(!m||m<=0) return '--'; const h=Math.floor(m/60),mn=m%60; return h>0?`${h}t ${mn}m`:`${mn}m`; }
    function tc(r) { return r>50?'var(--accent-green)':r>20?'var(--accent-orange)':'var(--accent-red)'; }

    // SVG spool matching dashboard spool-utils.js style
    function obsSpool(color, pct) {
      const hubR = 13, maxR = 38;
      const filR = pct > 0 ? hubR + (maxR - hubR) * Math.max(5, pct) / 100 : hubR;
      let windings = '';
      if (pct > 8) {
        const gap = (filR - hubR) / Math.min(5, Math.max(2, Math.round((filR - hubR) / 4)));
        for (let r = hubR + gap; r < filR - 1; r += gap) {
          windings += `<circle cx="50" cy="50" r="${r.toFixed(1)}" class="spool-winding"/>`;
        }
      }
      const notches = [0, 90, 180, 270].map(deg => {
        const rad = deg * Math.PI / 180;
        return `<line x1="${(50+40*Math.cos(rad)).toFixed(1)}" y1="${(50+40*Math.sin(rad)).toFixed(1)}" x2="${(50+44*Math.cos(rad)).toFixed(1)}" y2="${(50+44*Math.sin(rad)).toFixed(1)}" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>`;
      }).join('');
      return `<svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="rgba(255,255,255,0.03)"/>
        <circle cx="50" cy="50" r="42" class="spool-flange"/>
        ${notches}
        <circle cx="50" cy="50" r="${filR.toFixed(1)}" fill="${color||'#888'}" class="spool-filament"/>
        ${windings}
        <circle cx="50" cy="50" r="${hubR}" class="spool-hub"/>
        <circle cx="50" cy="50" r="5" class="spool-hole"/>
      </svg>`;
    }

    function update(data) {
      if(!data) return;
      const pd = data.print || data;
      const state = pd.gcode_state || 'IDLE';
      const isPrinting = state==='RUNNING'||state==='PAUSE';
      const pct = pd.mc_percent || 0;

      if(hideIdle && !isPrinting && state!=='FINISH') {
        document.getElementById('obs-panel').classList.add('obs-hidden');
        return;
      }
      document.getElementById('obs-panel').classList.remove('obs-hidden');

      // Header
      document.getElementById('obs-filename').textContent = pd.subtask_name||pd.gcode_file||'--';
      const stEl = document.getElementById('obs-state');
      stEl.textContent = state; stEl.className = 'obs-state '+(SCLS[state]||'obs-state-idle');

      // Progress
      document.getElementById('obs-pct').textContent = pct+'%';
      document.getElementById('obs-ring').setAttribute('stroke-dashoffset', CIRC-(pct/100)*CIRC);
      document.getElementById('obs-bar').style.width = pct+'%';
      document.getElementById('obs-eta').textContent = isPrinting ? 'ETA: '+fmtT(pd.mc_remaining_time) : (state==='FINISH'?'Ferdig':'--');
      const ln=pd.layer_num||0, tl=pd.total_layer_num||0;
      document.getElementById('obs-layers').textContent = tl>0?`Lag ${ln} / ${tl}`:'--';

      // Stage
      const sw = document.getElementById('obs-stage-wrap');
      if(sw && isPrinting && pd.stg_cur!=null && pd.stg_cur>=0 && pd.stg_cur<STG.length) {
        const c=parseInt(pd.stg_cur);
        const cls=STG_ERR.includes(c)?'obs-stage-error':STG_P.includes(c)?'obs-stage-pause':STG_C.includes(c)?'obs-stage-cal':'obs-stage-print';
        sw.innerHTML=`<span class="obs-stage ${cls}">${STG[c]}</span>`;
      } else if(sw) sw.innerHTML='';

      // Temps
      document.getElementById('obs-nozzle').textContent = pd.nozzle_temper!=null?Math.round(pd.nozzle_temper)+'\u00B0C':'--';
      document.getElementById('obs-bed').textContent = pd.bed_temper!=null?Math.round(pd.bed_temper)+'\u00B0C':'--';
      document.getElementById('obs-chamber').textContent = pd.chamber_temper!=null?Math.round(pd.chamber_temper)+'\u00B0C':'--';
      document.getElementById('obs-speed').textContent = SPEED[pd.spd_lvl]||`${pd.spd_mag||100}%`;

      // AMS with spool visuals
      const traysEl = document.getElementById('obs-trays');
      if(traysEl && pd.ams?.ams) {
        const active = pd.ams.tray_now;
        let h='', slot=1;
        for(const unit of pd.ams.ams) {
          for(const tray of (unit.tray||[])) {
            if(!tray||!tray.tray_type) { slot++; continue; }
            const color = tray.tray_color?'#'+tray.tray_color.substring(0,6):'#888';
            const remain = tray.remain>=0?tray.remain:0;
            const isActive = String(tray.id)===String(active);
            const fc = tc(remain);
            const name = tray.tray_sub_brands||tray.tray_type||'';
            h+=`<div class="obs-tray${isActive?' active':''}">
              <span class="obs-tray-slot">${slot}</span>
              ${isActive?'<span class="obs-tray-active-dot"></span>':''}
              <span class="obs-tray-spool">${obsSpool(color, remain)}</span>
              <span class="obs-tray-label">${name}</span>
              <span class="obs-tray-pct" style="color:${fc}">${remain}%</span>
            </div>`;
            slot++;
          }
        }
        traysEl.innerHTML=h;
      }

      // Model thumbnail (from print history if available)
      updateThumbnail(pd);
    }

    function updateThumbnail(pd) {
      const card = document.getElementById('obs-model-card');
      const img = document.getElementById('obs-model-img');
      if(!card||!img) return;
      const file = pd.gcode_file||pd.subtask_name||'';
      if(!file) { card.style.display='none'; return; }
      const url = '/api/printers/'+encodeURIComponent(activePrinterId)+'/thumbnail?file='+encodeURIComponent(file);
      if(url!==lastThumbnailUrl) {
        lastThumbnailUrl=url;
        img.onload=()=>{ card.style.display=''; };
        img.onerror=()=>{ card.style.display='none'; };
        img.src=url;
      }
    }

    function initCamera(port) {
      if(!port||port===cameraPort) return;
      cameraPort=port;
      if(typeof JSMpeg==='undefined') return;
      if(cameraPlayer) { try{cameraPlayer.destroy();}catch(_){} cameraPlayer=null; }

      const container = document.getElementById('obs-cam-container');
      const ph = document.getElementById('obs-cam-ph');
      const wsUrl=`ws://${location.hostname}:${port}`;
      const probe=new WebSocket(wsUrl);
      const timeout=setTimeout(()=>probe.close(),3000);

      probe.onopen=()=>{
        clearTimeout(timeout); probe.close();
        const canvas=document.createElement('canvas');
        container.innerHTML=''; container.appendChild(canvas);
        cameraPlayer=new JSMpeg.Player(wsUrl,{
          canvas, autoplay:true, audio:false, loop:false,
          onSourceCompleted:()=>{ container.innerHTML='<div class="obs-cam-off">Stream avsluttet</div>'; }
        });
        // Verify frames after 3s
        setTimeout(()=>{
          try {
            const ctx=canvas.getContext('2d');
            const px=ctx.getImageData(0,0,1,1).data;
            if(px[3]===0) container.innerHTML='<div class="obs-cam-off">Kamera ikke tilgjengelig</div>';
          } catch(_){}
        },3000);
      };
      probe.onerror=()=>clearTimeout(timeout);
    }

    let ws=null, rd=1000;
    function connect() {
      const protocol=location.protocol==='https:'?'wss:':'ws:';
      ws=new WebSocket(`${protocol}//${location.host}/ws`);
      ws.onopen=()=>{rd=1000;};
      ws.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==='init'&&msg.data) {
            printerMeta=msg.data.printers||{};
            activePrinterId=targetPrinter||Object.keys(printerMeta)[0]||null;
            if(activePrinterId&&msg.data.states?.[activePrinterId]) {
              update(msg.data.states[activePrinterId]);
              if(printerMeta[activePrinterId]?.cameraPort) initCamera(printerMeta[activePrinterId].cameraPort);
            }
          } else if(msg.type==='printer_meta_update'&&msg.data) {
            printerMeta={};
            for(const p of (msg.data.printers||[])) printerMeta[p.id]=p;
            if(activePrinterId&&printerMeta[activePrinterId]?.cameraPort) initCamera(printerMeta[activePrinterId].cameraPort);
          } else if(msg.type==='status'&&msg.data?.printer_id===activePrinterId) {
            update(msg.data);
            if(!cameraPort&&printerMeta[activePrinterId]?.cameraPort) initCamera(printerMeta[activePrinterId].cameraPort);
          }
        }catch(_){}
      };
      ws.onclose=()=>{setTimeout(connect,rd);rd=Math.min(rd*2,10000);};
      ws.onerror=()=>ws.close();
    }
    connect();
  })();
  </script>
</body>
</html>
